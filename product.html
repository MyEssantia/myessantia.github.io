<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyEssantia · product · essential</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Premium Fonts - Inter & Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300..900&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- Common CSS -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">
  
  <style>
    /* ===== GLOBAL FONT VARIABLES ===== */
    :root {
      --font-body-family: 'Inter', 'Montserrat', sans-serif;
      --font-body-style: normal;
      --font-body-weight: 400;
      --font-body-weight-bold: 700;
      --font-heading-family: 'Montserrat', sans-serif;
      --font-heading-style: normal;
      --font-heading-weight: 800;
      --font-body-scale: 1.0;
      --font-heading-scale: 1.0;
      --regular-font-size: 16px;
      
      /* Keep all other CSS variables */
      --media-padding: px;
      --media-border-opacity: 1.0;
      --media-border-width: 2px;
      --media-radius: 12px;
      --media-shadow-opacity: 1.0;
      --media-shadow-horizontal-offset: 0px;
      --media-shadow-vertical-offset: 6px;
      --media-shadow-blur-radius: 0px;
      --media-shadow-visible: 1;
      --page-width: 120rem;
      --page-width-margin: 0rem;
      --product-card-image-padding: 0.0rem;
      --product-card-corner-radius: 1.2rem;
      --product-card-text-alignment: left;
      --product-card-border-width: 0.2rem;
      --product-card-border-opacity: 1.0;
      --product-card-shadow-opacity: 1.0;
      --product-card-shadow-visible: 1;
      --product-card-shadow-horizontal-offset: 0.0rem;
      --product-card-shadow-vertical-offset: 0.4rem;
      --product-card-shadow-blur-radius: 0.0rem;
      --badge-corner-radius: 4.0rem;
      --popup-border-width: 2px;
      --popup-border-opacity: 1.0;
      --popup-corner-radius: 12px;
      --popup-shadow-opacity: 1.0;
      --popup-shadow-horizontal-offset: 0px;
      --popup-shadow-vertical-offset: 2px;
      --popup-shadow-blur-radius: 0px;
      --buttons-radius: 40px;
      --buttons-radius-outset: 42px;
      --buttons-border-width: 2px;
      --buttons-border-opacity: 1.0;
      --buttons-shadow-opacity: 0.9;
      --buttons-shadow-visible: 1;
      --buttons-shadow-horizontal-offset: 0px;
      --buttons-shadow-vertical-offset: 2px;
      --buttons-shadow-blur-radius: 0px;
      --header-height: 79px;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html, body { 
      width: 100%; 
      overflow-x: hidden; 
      background: #ffffff; 
      scroll-behavior: smooth; 
    }
    
    body {
      font-family: var(--font-body-family);
      font-style: var(--font-body-style);
      font-weight: var(--font-body-weight);
      color: #1e1e1e;
      line-height: 1.5;
      font-size: 16px;
      letter-spacing: 0.02em;
    }

    h1, h2, h3, h4, h5, h6,
    .product-title,
    .reviews-header,
    .rating-main {
      font-family: var(--font-heading-family);
      font-style: var(--font-heading-style);
      font-weight: var(--font-heading-weight);
    }

    .container { 
      width: 100%; 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 0 20px; 
    }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 15px 0;
      font-size: 0.85rem;
      color: #4a4a4a;
    }
    
    .breadcrumb a { 
      color: #1e1e1e; 
      text-decoration: none; 
      font-weight: 600; 
    }
    
    .breadcrumb a:hover { 
      color: #d4af37; 
    }
    
    .breadcrumb i { 
      font-size: 0.7rem; 
      color: #d4af37; 
    }

    /* ===== PRODUCT GRID ===== */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      padding-bottom: 50px;
    }

    /* ===== GALLERY SECTION ===== */
    .gallery-section { 
      width: 100%; 
    }
    
    .main-image {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 15px;
      background: #ffffff;
      border: 2px solid #000000;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
    }
    
    .main-image img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    
    .thumbnail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    
    .thumbnail {
      aspect-ratio: 1/1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid #000;
    }
    
    .thumbnail:hover { 
      border-color: #d4af37; 
    }
    
    .thumbnail.active { 
      border-color: #d4af37; 
      border-width: 3px; 
    }
    
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== RATING CHART ===== */
    .rating-chart-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 15px;
      margin: 15px 0;
      border: 2px solid #000000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }

    .rating-chart-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid #000;
    }

    .rating-main {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
      line-height: 1;
    }

    .rating-outof {
      font-size: 0.9rem;
      color: #666;
    }

    .rating-stars-large {
      color: #d4af37;
      font-size: 1rem;
    }

    .rating-count {
      font-size: 0.8rem;
      background: #f5f5f5;
      padding: 4px 12px;
      border-radius: 40px;
      border: 1px solid #000;
      font-weight: 600;
      margin-left: auto;
    }

    .rating-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rating-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .bar-label {
      min-width: 35px;
      font-weight: 700;
    }

    .bar-container {
      flex: 1;
      height: 18px;
      background: #f0f0f0;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid #000;
    }

    .bar-fill {
      height: 100%;
      background: #d4af37;
      border-radius: 8px;
    }

    .bar-percent {
      min-width: 40px;
      text-align: right;
      font-weight: 600;
      font-size: 0.75rem;
    }

    /* ===== BADGES ===== */
    .social-strip { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      margin-bottom: 15px; 
    }
    
    .sold-badge, .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 2px solid #000;
    }
    
    .sold-badge {
      background: #dc2626;
      color: white;
    }
    
    .live-badge {
      background: #16a34a;
      color: white;
    }

    .sale-badge {
      background: #000;
      color: #d4af37;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 0.9rem;
      border: 2px solid #d4af37;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== PRODUCT INFO ===== */
    .product-category {
      font-size: 0.8rem;
      font-weight: 700;
      color: #d4af37;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    
    .product-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 15px;
      color: #000;
    }

    .rating-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .stars { 
      display: flex; 
      gap: 3px; 
      color: #d4af37; 
      font-size: 1rem; 
    }

    /* ===== SHARE BUTTON ===== */
    .share-wrapper { 
      position: relative; 
      margin-left: auto; 
    }
    
    .share-btn {
      background: #ffffff;
      border: 2px solid #000;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .share-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: white;
      border-radius: 20px;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
      padding: 20px;
      width: 280px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.3s;
      border: 2px solid #000;
    }
    
    .share-menu.show { 
      opacity: 1; 
      visibility: visible; 
      transform: translateY(0); 
    }
    
    .share-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .share-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px;
      border-radius: 12px;
      background: #f6f6f6;
      border: 1px solid #ddd;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    .copy-link { 
      display: flex; 
      gap: 8px; 
    }
    
    .copy-link input { 
      flex: 1; 
      padding: 10px; 
      border: 2px solid #000; 
      border-radius: 12px; 
      font-size: 0.8rem; 
    }
    
    .copy-btn { 
      padding: 10px 16px; 
      background: #000; 
      color: #d4af37; 
      border-radius: 12px; 
      font-weight: 700; 
      border: 2px solid #000; 
      cursor: pointer; 
    }

    /* ===== PRICE CARD ===== */
    .price-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      border: 2px solid #000;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
    }
    
    .price-header {
      display: flex;
      align-items: baseline;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    
    .current-price { 
      font-size: 2.2rem; 
      font-weight: 900; 
      color: #000; 
    }
    
    .inr-symbol { 
      font-size: 1.4rem; 
      font-weight: 700; 
      color: #d4af37; 
    }
    
    .original-price { 
      font-size: 1.1rem; 
      color: #777; 
      text-decoration: line-through; 
    }
    
    .tax-info {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #ccc;
    }

    .price-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .price-option {
      padding: 12px 8px;
      border-radius: 14px;
      text-align: center;
      border: 2px solid;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .price-option.prepaid {
      background: #d4af37;
      border-color: #000;
      color: #000;
    }

    .price-option.cod {
      background: #000;
      border-color: #d4af37;
      color: #d4af37;
    }

    .option-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .option-price {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.2;
    }

    /* ===== QUANTITY CONTROL ===== */
    .quantity-stock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      background: #f9f9f9;
      border-radius: 60px;
      padding: 8px 20px;
      border: 2px solid #000;
      margin-top: 15px;
    }
    
    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border-radius: 40px;
      padding: 2px;
      border: 1px solid #e0e0e0;
    }
    
    .qty-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 50%;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
    }
    
    .qty-btn:hover:not(:disabled) {
      background: #d4af37;
    }
    
    .qty-input {
      width: 50px;
      height: 40px;
      border: 2px solid #000;
      border-radius: 30px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
    }
    
    .stock-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      background: #000;
      color: #d4af37;
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid #d4af37;
    }

    /* ===== DELIVERY CARD ===== */
    .delivery-card {
      background: #ffffff;
      border: 2px solid #000;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    
    .delivery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .delivery-title { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-weight: 700; 
    }
    
    .delivery-min { 
      background: #000; 
      color: #d4af37; 
      padding: 4px 12px; 
      border-radius: 60px; 
      font-weight: 600; 
      font-size: 0.8rem; 
    }
    
    .progress-bar { 
      height: 10px; 
      background: #eaeaea; 
      border-radius: 5px; 
      overflow: hidden; 
      margin: 10px 0; 
      border: 1px solid #000; 
    }
    
    .progress-fill { 
      height: 100%; 
      background: #d4af37; 
    }
    
    .delivery-message { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-weight: 600; 
      font-size: 0.9rem; 
    }
    
    .delivery-eta {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #ccc;
    }
    
    .delivery-eta-circle {
      background: #d4af37;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
      flex-shrink: 0;
    }
    
    .delivery-eta-circle i {
      color: #000;
      font-size: 1.2rem;
    }

    /* ===== FEATURE CARD ===== */
    .feature-razor-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      border: 2px solid #000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
    
    .razorpay-promise {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px;
      background: #000;
      border-radius: 16px;
      border: 2px solid #d4af37;
      margin-bottom: 15px;
      cursor: pointer;
    }
    
    .promise-icon {
      width: 48px;
      height: 48px;
      background: #d4af37;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1.2rem;
      border: 2px solid #000;
    }
    
    .promise-content h4 {
      font-size: 1rem;
      font-weight: 800;
      color: #d4af37;
      margin-bottom: 4px;
    }
    
    .promise-content p {
      font-size: 0.8rem;
      color: #eee;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #fafafa;
      border-radius: 14px;
      border: 2px solid #000;
    }
    
    .feature-icon {
      width: 36px;
      height: 36px;
      background: #000;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d4af37;
      font-size: 1rem;
    }

    /* ===== ACTION BUTTONS ===== */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 2px solid #000;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
    }
    
    .btn-secondary {
      background: #ffffff;
      color: #000;
    }

    /* ===== DESCRIPTION SECTION ===== */
    .product__description {
      margin: 20px 0;
      font-size: 1rem;
      line-height: 1.6;
    }
    
    .product__description p {
      margin-bottom: 1.2rem;
    }
    
    .product__description h2 {
      font-size: 1.5rem;
      margin: 1.5rem 0 1rem;
    }
    
    .product__description h3 {
      font-size: 1.3rem;
      margin: 1.3rem 0 0.8rem;
    }
    
    .product__description img {
      max-width: 100%;
      border-radius: 12px;
      border: 2px solid #000;
      margin: 1rem 0;
    }
    
    .product__description video,
    .product__description iframe {
      max-width: 100%;
      border-radius: 12px;
      margin: 1rem 0;
    }
    
    .product__description ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1.2rem;
    }
    
    .product__description li {
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .product__description li i {
      color: #d4af37;
      font-size: 1rem;
    }

    /* ===== REVIEWS SECTION ===== */
    .reviews-header {
      font-size: 1.5rem;
      font-weight: 800;
      color: #000;
      border-bottom: 3px solid #d4af37;
      padding-bottom: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .write-review-btn {
      background: #000;
      color: #d4af37;
      border: 2px solid #d4af37;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
      margin: 0 0 30px;
    }
    
    .review-card {
      background: #fff;
      box-shadow: 0 0 2px rgba(0,0,0,0.25);
      overflow: hidden;
      border-radius: 16px;
    }
    
    .review-media {
      width: 100%;
      max-height: 250px;
      overflow: hidden;
    }
    
    .review-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .review-details {
      padding: 20px;
    }
    
    .author-name {
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    
    .tydal-star-wrapper {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 10px;
    }
    
    .star {
      height: 18px;
      width: 18px;
      fill: #F1C645;
    }
    
    .review-text {
      font-size: 1rem;
      line-height: 1.5;
      color: #000;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    /* ===== DESKTOP REVIEWS ===== */
    .desktop-only-rating {
      display: block;
    }
    
    .mobile-only-rating {
      display: none;
    }
    
    .desktop-reviews-section {
      margin-top: 30px;
    }
    
    .mobile-reviews {
      display: none;
    }

    /* ===== MODAL STYLES ===== */
    .review-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    
    .review-modal.show {
      display: flex;
    }
    
    .review-modal-content {
      background: #fff;
      border-radius: 30px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;

<body>

  <div id="header"></div>
  <div class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fa-solid fa-arrow-up"></i>
  </div>

  <!-- HIGH DEMAND NOTIFICATION POPUP -->
  <div class="high-demand-popup" id="highDemandPopup">
    <div class="popup-content">
      <div class="popup-close-btn" onclick="closeHighDemandPopup()">✕</div>
      <h3><i class="fa-solid fa-fire"></i> High Demand!</h3>
      <p>This product is currently in <strong>high demand</strong> and we have limited stock available.</p>
      <div class="warning">
        <i class="fa-solid fa-exclamation-triangle"></i> Only limited stocks are supplied. We'll notify you when the product is ready to dispatch.
      </div>
      <div id="emailNotificationForm">
        <div class="email-input-group">
          <label><i class="fa-regular fa-envelope"></i> Enter your email</label>
          <input type="email" id="notificationEmail" placeholder="your@email.com" required>
        </div>
        <div class="popup-actions">
          <button class="btn-primary" onclick="submitNotification('buy')">Notify Me</button>
          <button class="btn-secondary" onclick="closeHighDemandPopup()">Cancel</button>
        </div>
      </div>
      <div id="alreadyNotifiedMessage" class="already-notified" style="display: none;">
        <i class="fa-solid fa-check-circle"></i> You've already requested notification for this product.
      </div>
    </div>
  </div>

  <main>
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i>
        <a href="collection.html">Collection</a>
        <i class="fa-solid fa-chevron-right"></i>
        <span id="breadcrumb-product">Loading...</span>
      </div>
    </div>

    <div class="container" id="product-container"></div>
  </main>

  <div id="footer"></div>
  <div id="common-modals"></div>

  <script>
    // ========== FIREBASE INITIALIZATION ==========
    const firebaseConfig = {
      apiKey: "AIzaSyD16uGnm1vodkbqGoFSdFdJjGFSLpJmflk",
      authDomain: "myessantia.firebaseapp.com",
      projectId: "myessantia",
      storageBucket: "myessantia.firebasestorage.app",
      messagingSenderId: "701726517205",
      appId: "1:701726517205:web:f6ab79efdffeab6dbbbf5c",
      measurementId: "G-SZF11SHZBH"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ========== HEADER/FOOTER LOADING FUNCTION ==========
    async function loadComponents() {
      try {
        const headerResponse = await fetch('header.html');
        const headerHtml = await headerResponse.text();
        document.getElementById('header').innerHTML = headerHtml;
        
        const footerResponse = await fetch('footer.html');
        const footerHtml = await footerResponse.text();
        document.getElementById('footer').innerHTML = footerHtml;
        
        if (typeof window.updateCartCount === 'function') {
          window.updateCartCount();
        }
      } catch (error) {
        console.error('Error loading components:', error);
      }
    }

    // ========== PRODUCT PAGE SPECIFIC CODE ==========
    let currentProduct = null;
    let selectedPaymentMethod = 'prepaid';
    let currentAction = null;
    let productReviews = [];
    
    const STORAGE_KEY = 'myessantia_product_data';
    const NOTIFICATION_STORAGE_KEY = 'myessantia_notifications';
    const PURCHASE_STORAGE_KEY = 'myessantia_purchased_products';
    
    function hasUserPurchased(productId) {
      const purchased = JSON.parse(localStorage.getItem(PURCHASE_STORAGE_KEY) || '{}');
      return purchased[productId] === true;
    }
    
    function hasRequestedNotification(productId) {
      const notifications = JSON.parse(localStorage.getItem(NOTIFICATION_STORAGE_KEY) || '{}');
      return !!notifications[productId];
    }

    function markNotificationRequested(productId, email) {
      const notifications = JSON.parse(localStorage.getItem(NOTIFICATION_STORAGE_KEY) || '{}');
      notifications[productId] = {
        email: email,
        timestamp: new Date().toISOString(),
        productTitle: currentProduct?.title || 'Unknown Product'
      };
      localStorage.setItem(NOTIFICATION_STORAGE_KEY, JSON.stringify(notifications));
    }

    async function submitNotificationToFirebase(productId, email, actionType) {
      try {
        await db.collection('notifications').add({
          productId: productId,
          productTitle: currentProduct?.title || 'Unknown Product',
          email: email,
          actionType: actionType,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          status: 'pending'
        });
      } catch (error) {
        console.error('Error saving notification to Firebase:', error);
      }
    }

    function getRandomSold() { 
      return Math.floor(Math.random() * (2000 - 500 + 1)) + 500; 
    }
    
    function getRandomViewers() { 
      return Math.floor(Math.random() * (35 - 8 + 1)) + 8; 
    }

    async function loadProductReviews(productId) {
      try {
        const snapshot = await db.collection('reviews')
          .where('productId', '==', productId)
          .get();
        
        const reviews = snapshot.docs.map(doc => {
          const data = doc.data();
          let reviewDate = new Date();
          if (data.timestamp) {
            if (data.timestamp.toDate) {
              reviewDate = data.timestamp.toDate();
            } else if (data.timestamp.seconds) {
              reviewDate = new Date(data.timestamp.seconds * 1000);
            }
          }
          
          return {
            id: doc.id,
            reviewerName: data.reviewerName || data.name || 'Anonymous',
            city: data.city || 'India',
            rating: data.rating || 5,
            comment: data.comment || data.review || '',
            verified: data.verified || false,
            imageUrl: data.imageUrl || data.image || null,
            timestamp: reviewDate
          };
        });
        
        reviews.sort((a, b) => b.timestamp - a.timestamp);
        return reviews;
        
      } catch (error) {
        console.error('Error loading reviews:', error);
        return [];
      }
    }

    async function submitReview(reviewData) {
      try {
        await db.collection('reviews').add({
          ...reviewData,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          verified: true
        });
        return true;
      } catch (error) {
        console.error('Error submitting review:', error);
        return false;
      }
    }

    function getProductId() { 
      return new URLSearchParams(window.location.search).get('id'); 
    }

    function generateRatingDistribution(reviews) {
      let distribution = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
      
      if (reviews.length === 0) {
        const baseRating = currentProduct?.rating || 4.5;
        if (baseRating >= 4.5) {
          distribution = { 5: 75, 4: 15, 3: 6, 2: 3, 1: 1 };
        } else if (baseRating >= 4.0) {
          distribution = { 5: 55, 4: 25, 3: 12, 2: 5, 1: 3 };
        } else if (baseRating >= 3.5) {
          distribution = { 5: 35, 4: 30, 3: 20, 2: 10, 1: 5 };
        } else {
          distribution = { 5: 20, 4: 25, 3: 25, 2: 18, 1: 12 };
        }
      } else {
        reviews.forEach(review => {
          const rating = Math.round(review.rating);
          if (rating >= 1 && rating <= 5) {
            distribution[rating]++;
          }
        });
        
        const total = reviews.length;
        if (total > 0) {
          distribution = {
            5: Math.round((distribution[5] / total) * 100),
            4: Math.round((distribution[4] / total) * 100),
            3: Math.round((distribution[3] / total) * 100),
            2: Math.round((distribution[2] / total) * 100),
            1: Math.round((distribution[1] / total) * 100)
          };
        }
      }
      
      const sum = distribution[5] + distribution[4] + distribution[3] + distribution[2] + distribution[1];
      if (sum !== 100 && sum > 0) {
        distribution[5] += (100 - sum);
      }
      
      return distribution;
    }

    function getStars(r) { 
      r = parseFloat(r) || 4.5; 
      let s = ''; 
      for(let i = 1; i <= 5; i++) { 
        if(r >= i) s += '<i class="fa-solid fa-star"></i>'; 
        else if(r > i-1 && r < i) s += '<i class="fa-solid fa-star-half-alt"></i>'; 
        else s += '<i class="fa-regular fa-star"></i>'; 
      } 
      return s; 
    }

    function getLargeStars(rating) {
      rating = parseFloat(rating) || 4.5;
      let stars = '';
      for(let i = 1; i <= 5; i++) {
        if(rating >= i) stars += '<i class="fa-solid fa-star"></i>';
        else if(rating > i-1 && rating < i) stars += '<i class="fa-solid fa-star-half-alt"></i>';
        else stars += '<i class="fa-regular fa-star"></i>';
      }
      return stars;
    }

    function selectPaymentMethod(method, event) {
      selectedPaymentMethod = method;
      document.querySelectorAll('.price-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      event.currentTarget.classList.add('selected');
    }

    window.toggleRazorpayPopup = function() {
      const popup = document.getElementById('razorpayPopup');
      if (popup) popup.classList.toggle('show');
    };

    window.closeRazorpayPopup = function() {
      const popup = document.getElementById('razorpayPopup');
      if (popup) popup.classList.remove('show');
    };

    window.toggleReviewModal = function() {
      const modal = document.getElementById('reviewModal');
      if (modal) modal.classList.toggle('show');
    };

    window.closeReviewModal = function() {
      const modal = document.getElementById('reviewModal');
      if (modal) {
        modal.classList.remove('show');
        document.getElementById('reviewForm')?.reset();
        const preview = document.getElementById('reviewImagePreview');
        if (preview) preview.style.display = 'none';
        window.selectedReviewImage = null;
      }
    };

    window.handleReviewImageUpload = function(input) {
      const file = input.files[0];
      if (!file) return;
      
      if (file.size > 5 * 1024 * 1024) {
        showNotification('Image too large (max 5MB)', 'error');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const preview = document.getElementById('reviewImagePreview');
        const previewImg = document.getElementById('reviewImagePreviewImg');
        if (preview && previewImg) {
          previewImg.src = e.target.result;
          preview.style.display = 'block';
        }
        window.selectedReviewImage = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.removeReviewImage = function() {
      const preview = document.getElementById('reviewImagePreview');
      const previewImg = document.getElementById('reviewImagePreviewImg');
      const fileInput = document.getElementById('reviewImageFile');
      if (preview) preview.style.display = 'none';
      if (previewImg) previewImg.src = '';
      if (fileInput) fileInput.value = '';
      window.selectedReviewImage = null;
    };

    window.submitReview = async function() {
      if (!currentProduct) return;
      
      if (!hasUserPurchased(currentProduct.id)) {
        showNotification('You can only review products you have purchased!', 'error');
        return;
      }
      
      const name = document.getElementById('reviewerName')?.value.trim();
      const rating = parseInt(document.getElementById('reviewRating')?.value);
      const comment = document.getElementById('reviewComment')?.value.trim();
      const city = document.getElementById('reviewerCity')?.value.trim() || 'India';
      
      if (!name || !rating || !comment) {
        showNotification('Please fill all required fields', 'error');
        return;
      }
      
      const reviewData = {
        productId: currentProduct.id,
        reviewerName: name,
        city: city,
        rating: rating,
        comment: comment,
        imageUrl: window.selectedReviewImage || null,
        verified: true
      };
      
      const success = await submitReview(reviewData);
      
      if (success) {
        showNotification('Thank you for your review!', 'success');
        window.closeReviewModal();
        productReviews = await loadProductReviews(currentProduct.id);
        renderProduct(currentProduct);
      }
    };

    window.showHighDemandPopup = function(action) {
      currentAction = action;
      const popup = document.getElementById('highDemandPopup');
      const emailForm = document.getElementById('emailNotificationForm');
      const alreadyMessage = document.getElementById('alreadyNotifiedMessage');
      
      if (hasRequestedNotification(currentProduct.id)) {
        emailForm.style.display = 'none';
        alreadyMessage.style.display = 'block';
      } else {
        emailForm.style.display = 'block';
        alreadyMessage.style.display = 'none';
        document.getElementById('notificationEmail').value = '';
      }
      
      popup.classList.add('show');
    };

    window.closeHighDemandPopup = function() {
      document.getElementById('highDemandPopup').classList.remove('show');
      currentAction = null;
    };

    window.submitNotification = async function(actionType) {
      if (!currentProduct) return;
      
      const email = document.getElementById('notificationEmail')?.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showNotification('Please enter a valid email address', 'error');
        return;
      }
      
      markNotificationRequested(currentProduct.id, email);
      await submitNotificationToFirebase(currentProduct.id, email, actionType);
      
      document.getElementById('emailNotificationForm').style.display = 'none';
      document.getElementById('alreadyNotifiedMessage').style.display = 'block';
      
      showNotification('We\'ll notify you when this product is ready to dispatch!');
      updateButtonStates();
    };

    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = 'notification';
      if (type === 'error') {
        notification.style.background = '#ff4444';
        notification.style.color = 'white';
      }
      notification.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    window.addToCart = function() {
      if (!currentProduct) return;
      
      if (currentProduct.highDemand) {
        showHighDemandPopup('cart');
        return;
      }
      
      const quantity = parseInt(document.getElementById('productQuantity')?.value) || 1;
      
      if (currentProduct.stock <= 0) {
        showNotification('Sorry, this product is out of stock!');
        return;
      }

      if (quantity > currentProduct.stock) {
        showNotification(`Only ${currentProduct.stock} items available!`);
        return;
      }

      if (window.cart && Array.isArray(window.cart)) {
        const existingItem = window.cart.find(item => item.id === currentProduct.id);
        
        if (existingItem) {
          existingItem.quantity += quantity;
        } else {
          window.cart.push({
            id: currentProduct.id,
            title: currentProduct.title,
            category: currentProduct.category || 'accessory',
            price: currentProduct.price,
            primaryImg: currentProduct.primaryImg,
            quantity: quantity
          });
        }
        
        localStorage.setItem('MyEssantia_cart', JSON.stringify(window.cart));
        
        if (typeof window.updateCartCount === 'function') {
          window.updateCartCount();
        }
      }
      
      showNotification(`Added ${quantity} item${quantity > 1 ? 's' : ''} to cart!`);
      
      setTimeout(() => {
        if (typeof window.openCart === 'function') {
          window.openCart();
        }
      }, 500);
    };

    window.buyNow = function() {
      if (!currentProduct) return;
      
      if (currentProduct.highDemand) {
        showHighDemandPopup('buy');
        return;
      }
      
      window.addToCart();
      setTimeout(() => {
        window.location.href = 'checkout.html';
      }, 500);
    };

    function updateButtonStates() {
      const addToCartBtn = document.querySelector('.btn-secondary');
      const buyNowBtn = document.querySelector('.btn-primary');
      
      if (!addToCartBtn || !buyNowBtn || !currentProduct) return;
      
      if (currentProduct.highDemand) {
        if (hasRequestedNotification(currentProduct.id)) {
          addToCartBtn.innerHTML = '<i class="fa-regular fa-bell"></i> Will Notify Soon!';
          buyNowBtn.innerHTML = '<i class="fa-regular fa-bell"></i> Will Notify Soon!';
          addToCartBtn.disabled = true;
          buyNowBtn.disabled = true;
        }
      }
    }

    async function loadProduct() {
      const productId = getProductId();
      if (!productId) return showNotFound();
      
      try {
        const doc = await db.collection('products').doc(productId).get();
        if (!doc.exists) return showNotFound();
        
        currentProduct = { id: doc.id, ...doc.data() };
        document.getElementById('breadcrumb-product').textContent = currentProduct.title;
        
        productReviews = await loadProductReviews(productId);
        renderProduct(currentProduct);
        
      } catch (error) { 
        console.error('Error loading product:', error); 
        showNotFound();
      }
    }

    function showNotFound() {
      document.getElementById('product-container').innerHTML = `
        <div class="text-center" style="padding: 3rem 1.5rem;">
          <i class="fa-solid fa-box-open" style="font-size: 4rem; color: #d4af37;"></i>
          <h2 style="margin: 1rem 0;">Product Not Found</h2>
          <p>The product you're looking for doesn't exist or has been removed.</p>
          <a href="collection.html" class="btn btn-primary" style="display: inline-block; margin-top: 1.5rem; padding: 0.8rem 2rem; text-decoration: none;">Browse Collection</a>
        </div>
      `;
    }

    function renderProduct(product) {
      const images = [];
      if (product.media && Array.isArray(product.media)) {
        product.media.forEach(item => {
          if (item.url) images.push(item.url);
        });
      }
      if (images.length === 0) images.push(product.primaryImg || 'https://images.unsplash.com/photo-1578500494198-246f612d3b3d?w=600');
      
      const stock = product.stock || 10;
      const soldCount = getRandomSold();
      const liveViewers = getRandomViewers();
      
      const sellingPrice = product.price || 0;
      const originalPrice = product.originalPrice || Math.round(sellingPrice * 1.25);
      const discount = Math.round(((originalPrice - sellingPrice) / originalPrice) * 100);
      
      const prepaidPrice = product.prepaidPrice || Math.round(sellingPrice * 0.85);
      const codPrice = product.codPrice || Math.round(sellingPrice + 100);
      
      const reviewCount = product.reviewCount || (productReviews.length > 0 ? productReviews.length : Math.floor(Math.random() * (350 - 45 + 1)) + 45);
      const ratingDist = generateRatingDistribution(productReviews);

      const ratingChartHTML = `
        <div class="rating-chart-card mobile-only-rating">
          <div class="rating-chart-header">
            <div>
              <span class="rating-main">${(product.rating || 4.5).toFixed(1)}</span>
              <span class="rating-outof">/5</span>
            </div>
            <div class="rating-stars-large">${getLargeStars(product.rating || 4.5)}</div>
            <span class="rating-count">${reviewCount} reviews</span>
          </div>
          <div class="rating-bars">
            ${[5,4,3,2,1].map(star => `
            <div class="rating-bar-row">
              <span class="bar-label">${star} ★</span>
              <div class="bar-container">
                <div class="bar-fill" style="width: ${ratingDist[star]}%"></div>
              </div>
              <span class="bar-percent">${ratingDist[star]}%</span>
            </div>`).join('')}
          </div>
        </div>
      `;

      let reviewsHTML = '';

      if (productReviews && productReviews.length > 0) {
        reviewsHTML = `<div class="reviews-header">
          <span>Customer Reviews</span>
          <div>
            <span>★ ${(product.rating || 4.5).toFixed(1)} (${reviewCount})</span>
            <button class="write-review-btn" onclick="toggleReviewModal()">
              <i class="fa-solid fa-pen"></i> Write Review
            </button>
          </div>
        </div>`;
        
        reviewsHTML += `<div class="reviews-common-frame"><div class="reviews-grid">`;
        
        reviewsHTML += productReviews.map(review => {
          const rating = review.rating || 5;
          const fullStars = Math.floor(rating);
          const hasHalf = rating % 1 >= 0.5;
          
          let starsHTML = '';
          for (let i = 1; i <= 5; i++) {
            if (i <= fullStars) {
              starsHTML += `<svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
            } else if (i === fullStars + 1 && hasHalf) {
              starsHTML += `<svg class="star" viewBox="0 0 24 24"><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4V6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>`;
            } else {
              starsHTML += `<svg class="star" viewBox="0 0 24 24"><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>`;
            }
          }
          
          const imageUrl = review.imageUrl || 'https://d1327z4fntq4ap.cloudfront.net/00k6827oetc2yh1kg544bpu8rb3e';
          
          return `
            <div class="review-item">
              <div class="review-card">
                <div class="review-media">
                  <img src="${imageUrl}" alt="Review" onerror="this.src='https://d1327z4fntq4ap.cloudfront.net/00k6827oetc2yh1kg544bpu8rb3e'">
                </div>
                <div class="review-details">
                  <div class="author-name">${review.reviewerName}</div>
                  <div class="tydal-star-wrapper">${starsHTML}</div>
                  <div class="review-text">${review.comment}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        reviewsHTML += `</div></div>`;
      } else {
        reviewsHTML = `
          <div class="reviews-header">
            <span>Customer Reviews</span>
            <div>
              <span>★ ${(product.rating || 4.5).toFixed(1)} (${reviewCount})</span>
              <button class="write-review-btn" onclick="toggleReviewModal()">
                <i class="fa-solid fa-pen"></i> Write Review
              </button>
            </div>
          </div>
          <div class="reviews-common-frame">
            <div class="empty-state text-center" style="padding: 3rem;">
              <i class="fa-regular fa-star" style="font-size: 3rem; color: #d4af37;"></i>
              <h3>No reviews yet</h3>
              <p>Be the first to review this product!</p>
            </div>
          </div>
        `;
      }

      // Generate product description HTML from blocks
      let productDescriptionHTML = '<div class="product__description">';

      if (product.descriptionBlocks && Array.isArray(product.descriptionBlocks) && product.descriptionBlocks.length > 0) {
        product.descriptionBlocks.forEach(block => {
          if (block.type === 'text') {
            productDescriptionHTML += `<p>${block.content || ''}</p>`;
          }
          else if (block.type === 'heading') {
            const level = block.level || 'h2';
            productDescriptionHTML += `<${level}>${block.content || ''}</${level}>`;
          }
          else if (block.type === 'image') {
            if (block.url) {
              productDescriptionHTML += `<p class="text-center"><img src="${block.url}" alt="Product image"></p>`;
            }
          }
          else if (block.type === 'video') {
            const url = block.url || '';
            const alignment = block.alignment || 'center';
            
            if (url) {
              if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('youtube.com/watch?v=')) {
                  videoId = url.split('v=')[1]?.split('&')[0];
                } else if (url.includes('youtu.be/')) {
                  videoId = url.split('youtu.be/')[1]?.split('?')[0];
                }
                
                if (videoId) {
                  productDescriptionHTML += `<p class="text-center"><iframe width="100%" height="315" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen style="max-width: 560px; margin: 0 auto; display: block;"></iframe></p>`;
                }
              } else {
                productDescriptionHTML += `<p class="text-center"><video controls style="max-width: 100%;"><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video></p>`;
              }
            }
          }
          else if (block.type === 'bullets') {
            if (block.items && block.items.length > 0) {
              productDescriptionHTML += `<ul>`;
              block.items.forEach(item => {
                if (item) {
                  productDescriptionHTML += `<li><i class="fa-solid fa-check-circle"></i>${item}</li>`;
                }
              });
              productDescriptionHTML += `</ul>`;
            }
          }
        });
      } else {
        productDescriptionHTML += `<p>${product.description || product.shortDesc || 'Premium quality product from MyEssantia.'}</p>`;
        
        if (product.specs && product.specs.length > 0) {
          productDescriptionHTML += `<h3>✨ Key Features:</h3><ul>`;
          product.specs.forEach(spec => {
            productDescriptionHTML += `<li><i class="fa-solid fa-check-circle"></i>${spec}</li>`;
          });
          productDescriptionHTML += `</ul>`;
        }
      }

      productDescriptionHTML += '</div>';

      const mobileReviewsHTML = `
        <div class="mobile-reviews">
          ${ratingChartHTML}
          ${reviewsHTML}
        </div>
      `;

      const container = document.getElementById('product-container');
      container.innerHTML = `
        <!-- Write Review Modal -->
        <div class="review-modal" id="reviewModal">
          <div class="review-modal-content">
            <div class="review-modal-header">
              <h3><i class="fa-solid fa-pen"></i> Write a Review</h3>
              <button class="close-modal-btn" onclick="closeReviewModal()">×</button>
            </div>
            <form id="reviewForm" onsubmit="event.preventDefault(); submitReview();">
              <div class="review-modal-body">
                <div class="form-group">
                  <label><i class="fa-solid fa-user"></i> Your Name *</label>
                  <input type="text" id="reviewerName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                  <label><i class="fa-solid fa-location-dot"></i> City</label>
                  <input type="text" id="reviewerCity" placeholder="e.g. Mumbai">
                </div>
                <div class="form-group">
                  <label><i class="fa-solid fa-star"></i> Rating *</label>
                  <select id="reviewRating" required>
                    <option value="">Select rating</option>
                    <option value="5">5 ★ (Excellent)</option>
                    <option value="4">4 ★ (Good)</option>
                    <option value="3">3 ★ (Average)</option>
                    <option value="2">2 ★ (Poor)</option>
                    <option value="1">1 ★ (Terrible)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label><i class="fa-solid fa-comment"></i> Your Review *</label>
                  <textarea id="reviewComment" rows="4" placeholder="Share your experience..." required></textarea>
                </div>
                <div class="form-group">
                  <label><i class="fa-solid fa-image"></i> Add Photos (Optional)</label>
                  <div class="image-upload-area">
                    <input type="file" id="reviewImageFile" accept="image/*" onchange="handleReviewImageUpload(this)" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('reviewImageFile').click()">
                      <i class="fa-solid fa-cloud-upload-alt"></i> Choose Image
                    </button>
                    <div class="image-preview" id="reviewImagePreview">
                      <img id="reviewImagePreviewImg" src="" alt="Preview">
                      <button type="button" class="remove-image-btn" onclick="removeReviewImage()">×</button>
                    </div>
                  </div>
                  <small class="hint">Max 5MB. Images help other customers.</small>
                </div>
              </div>
              <div class="review-modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeReviewModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Submit Review</button>
              </div>
            </form>
          </div>
        </div>

        <div class="product-grid">
          <!-- GALLERY COLUMN -->
          <div class="gallery-section">
            <div class="main-image"><img src="${images[0]}" id="mainImage"></div>
            <div class="thumbnail-grid">
              ${images.map((img, i) => `<div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage('${img}', this)"><img src="${img}"></div>`).join('')}
            </div>
            <div class="rating-chart-card desktop-only-rating">
              <div class="rating-chart-header">
                <div>
                  <span class="rating-main">${(product.rating || 4.5).toFixed(1)}</span>
                  <span class="rating-outof">/5</span>
                </div>
                <div class="rating-stars-large">${getLargeStars(product.rating || 4.5)}</div>
                <span class="rating-count">${reviewCount} reviews</span>
              </div>
              <div class="rating-bars">
                ${[5,4,3,2,1].map(star => `
                <div class="rating-bar-row">
                  <span class="bar-label">${star} ★</span>
                  <div class="bar-container">
                    <div class="bar-fill" style="width: ${ratingDist[star]}%"></div>
                  </div>
                  <span class="bar-percent">${ratingDist[star]}%</span>
                </div>`).join('')}
              </div>
            </div>
            <div class="desktop-reviews-section">${reviewsHTML}</div>
          </div>
          
          <!-- INFO COLUMN -->
          <div class="product-info">
            <div class="social-strip">
              <span class="sold-badge"><i class="fa-solid fa-fire"></i> ${soldCount}+ sold</span>
              <span class="live-badge"><i class="fa-solid fa-circle"></i> ${liveViewers} viewing now</span>
            </div>
            <div class="product-category">${product.category || 'Accessories'}</div>
            <h1 class="product-title">${product.title}</h1>
            <div class="rating-row">
              <div class="stars">${getStars(product.rating)}</div>
              <span>${(product.rating || 4.5).toFixed(1)}</span>
              <span>(${reviewCount} reviews)</span>
              <div class="share-wrapper">
                <button class="share-btn" onclick="toggleShare(event)"><i class="fa-solid fa-share-alt"></i> Share</button>
                <div class="share-menu" id="shareMenu">
                  <div class="share-grid">
                    <div class="share-option" onclick="shareOn('facebook')"><i class="fa-brands fa-facebook"></i><span>Facebook</span></div>
                    <div class="share-option" onclick="shareOn('twitter')"><i class="fa-brands fa-twitter"></i><span>Twitter</span></div>
                    <div class="share-option" onclick="shareOn('whatsapp')"><i class="fa-brands fa-whatsapp"></i><span>WhatsApp</span></div>
                  </div>
                  <div class="copy-link">
                    <input id="shareLink" value="${window.location.href}" readonly>
                    <button class="copy-btn" onclick="copyLink()">Copy</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="price-card">
              <div class="price-header">
                <span class="current-price"><span class="inr-symbol">₹</span>${sellingPrice.toFixed(2)}</span>
                <span class="original-price">₹${originalPrice.toFixed(2)}</span>
                <span class="discount sale-badge"><i class="fa-solid fa-tag"></i> SALE</span>
              </div>
              <div class="tax-info"><i class="fa-solid fa-receipt"></i> Taxes included. Shipping calculated at checkout.</div>
              <div class="price-options">
                <div class="price-option prepaid selected" onclick="selectPaymentMethod('prepaid', event)">
                  <div class="option-label">Prepaid</div>
                  <div class="option-price">₹${prepaidPrice}</div>
                </div>
                <div class="price-option cod" onclick="selectPaymentMethod('cod', event)">
                  <div class="option-label">Cash on Delivery</div>
                  <div class="option-price">₹${codPrice}</div>
                </div>
              </div>
              
              <div class="quantity-stock-row">
                <div class="quantity-controls">
                  <button class="qty-btn" onclick="updateQuantity(-1)" ${stock === 0 ? 'disabled' : ''}>−</button>
                  <input type="text" class="qty-input" id="productQuantity" value="1" readonly>
                  <button class="qty-btn" onclick="updateQuantity(1)" ${stock === 0 ? 'disabled' : ''}>+</button>
                </div>
                <div class="stock-badge">
                  <i class="fa-solid ${stock > 10 ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> 
                  ${stock > 10 ? 'In Stock' : `Only ${stock} left`}
                </div>
              </div>
            </div>

            <div class="delivery-card">
              <div class="delivery-header">
                <span class="delivery-title"><i class="fa-solid fa-truck"></i> Free Delivery</span>
                <span class="delivery-min">Min. ₹1,299</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="deliveryProgress" style="width: ${Math.min(100, (sellingPrice / 1299) * 100)}%"></div>
              </div>
              <div class="delivery-message" id="deliveryMessage">
                <i class="fa-solid ${sellingPrice >= 1299 ? 'fa-circle-check' : 'fa-circle-info'}" style="color:#d4af37;"></i>
                <span id="deliveryText">${sellingPrice >= 1299 ? 'You get free delivery!' : `Add <span style="font-weight:800; color:#d4af37;">₹${(1299 - sellingPrice).toFixed(2)}</span> more`}</span>
              </div>
              <div class="delivery-eta">
                <div class="delivery-eta-circle">
                  <i class="fa-regular fa-calendar-check"></i>
                </div>
                <div>
                  <div style="font-weight: 800;">Delivery by</div>
                  <div style="font-weight: 700;" id="deliveryDates"></div>
                </div>
              </div>
            </div>

            <div class="feature-razor-card">
              <div id="razorpayPopup" class="razorpay-popup">
                <div class="popup-title"><i class="fa-solid fa-shield"></i> Razorpay Money Back Promise</div>
                <div class="popup-desc">Your purchase from MyEssantia is protected by Razorpay Money Back Promise</div>
                <div class="popup-bullets">
                  <div><i class="fa-solid fa-circle-check"></i> <span><strong>100% refund</strong> on non-delivery or damaged/defective items</span></div>
                  <div><i class="fa-solid fa-circle-check"></i> <span><strong>100% free</strong> with no hidden costs</span></div>
                </div>
                <p style="font-size: 0.85rem; font-style: italic;">Razorpay offers Money Back Promise only on select businesses that pass detailed background checks.</p>
                <div class="popup-footer">
                  <button onclick="closeRazorpayPopup()" class="popup-gotit-btn">Yes, got it</button>
                  <a href="shipping.html" class="popup-terms-link">Read detailed terms and conditions</a>
                </div>
              </div>
              
              <div class="razorpay-promise" onclick="toggleRazorpayPopup()">
                <div class="promise-icon"><i class="fa-solid fa-shield"></i></div>
                <div class="promise-content">
                  <h4>Razorpay Money Back Promise</h4>
                  <p>Click to view full guarantee</p>
                </div>
              </div>
              
              <div class="features-grid">
                <div class="feature-item">
                  <div class="feature-icon"><i class="fa-solid fa-truck-fast"></i></div>
                  <div><h4>Free Shipping</h4><p>Above ₹1,299</p></div>
                </div>
                <div class="feature-item">
                  <div class="feature-icon"><i class="fa-solid fa-rotate-left"></i></div>
                  <div><h4>Easy Returns</h4><p>7-Days</p></div>
                </div>
              </div>
            </div>

            <div class="action-buttons">
              <button class="btn btn-secondary" onclick="addToCart()" ${stock === 0 ? 'disabled' : ''}>
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
              </button>
              <button class="btn btn-primary" onclick="buyNow()" ${stock === 0 ? 'disabled' : ''}>
                <i class="fa-solid fa-bolt"></i> Buy Now
              </button>
            </div>

            ${productDescriptionHTML}
            ${mobileReviewsHTML}
          </div>
        </div>
      `;

      updateDeliveryBar(sellingPrice);
      updateButtonStates();
      
      const dates = getDeliveryDates();
      const deliveryElement = document.getElementById('deliveryDates');
      if (deliveryElement) deliveryElement.textContent = dates.display;
    }

    window.changeImage = function(src, el) { 
      document.getElementById('mainImage').src = src; 
      document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active')); 
      el.classList.add('active'); 
    };

    window.updateQuantity = function(delta) { 
      const inp = document.getElementById('productQuantity'); 
      if (!inp) return;
      let v = parseInt(inp.value) || 1; 
      v += delta; 
      if(v < 1) v = 1; 
      if(currentProduct && v > currentProduct.stock) v = currentProduct.stock; 
      inp.value = v; 
      if(currentProduct) updateDeliveryBar(currentProduct.price * v); 
    };

    function updateDeliveryBar(t) { 
      const p = document.getElementById('deliveryProgress'); 
      const tx = document.getElementById('deliveryText'); 
      if(!p || !tx) return; 
      p.style.width = Math.min(100, (t/1299) * 100) + '%'; 
      tx.innerHTML = t >= 1299 ? 'You get free delivery!' : `Add <span style="font-weight:800; color:#d4af37;">₹${(1299 - t).toFixed(2)}</span> more`; 
    }

    window.toggleShare = function(e) { 
      e.stopPropagation(); 
      const m = document.getElementById('shareMenu'); 
      if (!m) return;
      m.classList.toggle('show'); 
      if(m.classList.contains('show')) {
        setTimeout(() => document.addEventListener('click', function f(e) { 
          if(!m.contains(e.target) && !e.target.closest('.share-btn')) { 
            m.classList.remove('show'); 
            document.removeEventListener('click', f); 
          } 
        }), 100); 
      }
    };

    document.addEventListener('DOMContentLoaded', () => { 
      loadComponents();
      loadProduct(); 
    });

    window.copyLink = function() { 
      const i = document.getElementById('shareLink'); 
      if (!i) return;
      i.select(); 
      navigator.clipboard.writeText(i.value); 
      document.querySelector('.copy-btn').textContent = 'Copied!'; 
      setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy', 2000); 
    };

    window.shareOn = function(platform) {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(currentProduct?.title || 'Check this product');
      let shareUrl = '';
      
      switch(platform) {
        case 'facebook':
          shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
          break;
        case 'twitter':
          shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
          break;
        case 'whatsapp':
          shareUrl = `https://wa.me/?text=${title}%20${url}`;
          break;
      }
      
      if (shareUrl) window.open(shareUrl, '_blank');
    };

    function getDeliveryDates() {
      const today = new Date();
      const minDate = new Date(today);
      minDate.setDate(today.getDate() + 5);
      const maxDate = new Date(today);
      maxDate.setDate(today.getDate() + 7);
      
      const options = { day: 'numeric', month: 'short' };
      const minDateStr = minDate.toLocaleDateString('en-IN', options);
      const maxDateStr = maxDate.toLocaleDateString('en-IN', options);
      
      return {
        display: `${minDateStr} - ${maxDateStr}`
      };
    }

    window.addEventListener('scroll', () => { 
      const scrollTop = document.getElementById('scrollTop');
      if (scrollTop) scrollTop.classList.toggle('visible', window.scrollY > 200); 
    });
  </script>
</body>
</html>
