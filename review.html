<!-- review.html - Complete working version -->
<div>
  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">
        <i class="fa-solid fa-star"></i>
      </div>
      <div class="stat-info">
        <h3 id="total-reviews">0</h3>
        <p>Total Reviews</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <i class="fa-solid fa-check-circle"></i>
      </div>
      <div class="stat-info">
        <h3 id="verified-reviews">0</h3>
        <p>Verified</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <i class="fa-solid fa-camera"></i>
      </div>
      <div class="stat-info">
        <h3 id="reviews-with-images">0</h3>
        <p>With Images</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <i class="fa-solid fa-cubes"></i>
      </div>
      <div class="stat-info">
        <h3 id="reviewed-products">0</h3>
        <p>Products</p>
      </div>
    </div>
  </div>

  <!-- Review Form Panel -->
  <div class="review-form-panel" id="reviewFormPanel">
    <div class="panel-header">
      <h3><i class="fa-solid fa-pen-to-square"></i> <span id="review-form-title">Add New Review</span></h3>
      <div class="close-panel" onclick="toggleReviewPanel()">
        <i class="fa-solid fa-times"></i>
      </div>
    </div>
    <div class="review-form">
      <form id="review-form" onsubmit="return handleReviewSubmit(event)">
        <input type="hidden" id="review-id">
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-box"></i> Product</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-box input-icon"></i>
              <select id="review-product-id" required>
                <option value="">Select a product...</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Reviewer Name</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-user input-icon"></i>
              <input type="text" id="reviewer-name" placeholder="e.g. John Doe" required>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-city"></i> City</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-city input-icon"></i>
              <input type="text" id="reviewer-city" placeholder="e.g. Mumbai" required>
            </div>
          </div>
          
          <div class="form-group">
            <label><i class="fa-solid fa-star"></i> Rating (1-5)</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-star input-icon"></i>
              <input type="number" step="0.5" min="1" max="5" id="review-rating" placeholder="4.5" required>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full-width">
            <label><i class="fa-solid fa-comment"></i> Review Comment</label>
            <textarea id="review-comment" rows="3" placeholder="Write your review here..." required></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i class="fa-solid fa-image"></i> Review Image (optional)</label>
            <div class="media-upload-row">
              <input type="text" class="media-url-input" id="review-image-url" placeholder="Image URL...">
              <button type="button" class="media-upload-btn" onclick="addReviewImageFromUrl()">
                <i class="fa-solid fa-plus"></i> Add
              </button>
              <input type="file" id="review-image-file" class="media-file-input" accept="image/*" onchange="handleReviewImageUpload(this.files)" style="display:none;">
              <label for="review-image-file" class="media-file-label">
                <i class="fa-solid fa-upload"></i> Upload
              </label>
            </div>
            
            <div id="review-image-preview" style="margin-top:12px; display:none;">
              <div style="display:flex; align-items:center; gap:12px;">
                <img id="review-image-preview-img" style="width:60px; height:60px; border-radius:12px; border:2px solid #000; object-fit:cover;">
                <button type="button" class="action-btn" onclick="removeReviewImage()" style="border-radius:40px; padding:6px 16px; width:auto;">
                  <i class="fa-solid fa-times"></i> Remove
                </button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fa-solid fa-check-circle"></i> Verified Purchase</label>
            <div style="display:flex; align-items:center; gap:12px; margin-top:8px;">
              <label class="toggle-switch">
                <input type="checkbox" id="review-verified" checked>
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">
                <i class="fa-solid fa-check-circle"></i> Verified
              </span>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 24px;">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-save"></i> Save Review
          </button>
          <button type="button" class="btn btn-outline" onclick="resetReviewForm()">
            <i class="fa-solid fa-times"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Filters Bar -->
  <div class="filters-bar">
    <div class="search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="search-reviews" placeholder="Search by reviewer, city or comment...">
    </div>
    
    <div class="filter-tabs">
      <span class="filter-tab active" id="filter-all" onclick="filterReviews('all')">All</span>
      <span class="filter-tab" id="filter-verified" onclick="filterReviews('verified')">Verified</span>
      <span class="filter-tab" id="filter-unverified" onclick="filterReviews('unverified')">Unverified</span>
      <span class="filter-tab" id="filter-with-image" onclick="filterReviews('with-image')">With Images</span>
    </div>
    
    <div style="display: flex; gap: 12px;">
      <button class="export-btn" onclick="toggleReviewPanel()">
        <i class="fa-solid fa-plus"></i> New Review
      </button>
      <button class="export-btn" onclick="exportReviews()">
        <i class="fa-solid fa-download"></i> Export CSV
      </button>
    </div>
  </div>

  <!-- Table Container -->
  <div class="table-container">
    <div class="table-header">
      <h2><i class="fa-solid fa-star"></i> Product Reviews</h2>
      <div class="header-actions">
        <button class="template-btn" onclick="loadReviews()">
          <i class="fa-solid fa-rotate"></i> Refresh
        </button>
      </div>
    </div>
    
    <!-- Loading State -->
    <div id="reviews-loading" class="loading-spinner" style="display: none;">
      <div class="spinner"></div>
    </div>
    
    <!-- Empty State -->
    <div id="reviews-empty-state" class="empty-state" style="display: none;">
      <i class="fa-regular fa-star"></i>
      <h3>No Reviews Yet</h3>
      <p>Add your first review using the form above</p>
    </div>
    
    <!-- Desktop Table View -->
    <div class="table-wrapper" id="reviews-table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Reviewer</th>
            <th>Rating</th>
            <th>Comment</th>
            <th>Image</th>
            <th>Verified</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reviews-table-body">
          <!-- Will be populated by JavaScript -->
        </tbody>
      </table>
    </div>
    
    <!-- Mobile Cards View -->
    <div id="reviews-mobile-cards" class="mobile-cards"></div>
    
    <!-- Pagination -->
    <div class="pagination" id="reviews-pagination" style="display: none;">
      <button class="page-btn" id="prev-review-page" onclick="changeReviewPage('prev')">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="page-numbers" id="review-page-numbers"></div>
      <button class="page-btn" id="next-review-page" onclick="changeReviewPage('next')">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  console.log('Reviews page loaded');
  
  // Global variables for reviews page
  window.allReviews = [];
  window.filteredReviews = [];
  window.currentReviewFilter = 'all';
  window.currentReviewPage = 1;
  window.reviewItemsPerPage = 10;
  window.reviewProducts = {};
  window.reviewImageUrl = '';
  
  // Initialize reviews page
  setTimeout(() => {
    if (typeof loadReviews === 'function') {
      loadReviews();
    } else {
      console.log('Defining reviews functions...');
      
      // Load products for dropdown
      window.loadReviewProducts = async function() {
        try {
          const snap = await db.collection('products').get();
          let options = '<option value="">Select a product...</option>';
          snap.docs.forEach(doc => {
            const prod = doc.data();
            window.reviewProducts[doc.id] = { 
              title: prod.title, 
              primaryImg: prod.primaryImg || (prod.media?.[0]?.url) || 'https://via.placeholder.com/80',
              price: prod.price
            };
            options += `<option value="${doc.id}">${prod.title}</option>`;
          });
          const selectProduct = document.getElementById('review-product-id');
          if (selectProduct) selectProduct.innerHTML = options;
        } catch (e) { 
          console.error('Error loading products:', e); 
        }
      };
      
      // Load reviews from Firestore
      window.loadReviews = async function() {
        const loadingEl = document.getElementById('reviews-loading');
        const tableWrapper = document.getElementById('reviews-table-wrapper');
        const emptyState = document.getElementById('reviews-empty-state');
        
        if (loadingEl) loadingEl.style.display = 'flex';
        if (tableWrapper) tableWrapper.style.display = 'none';
        if (emptyState) emptyState.style.display = 'none';
        
        try {
          const snap = await db.collection('reviews').orderBy('timestamp', 'desc').get();
          window.allReviews = snap.docs.map(doc => ({
            id: doc.id,
            ...doc.data(),
            timestamp: doc.data().timestamp?.toDate() || new Date()
          }));
          
          await loadReviewProducts();
          applyReviewFilter(window.currentReviewFilter);
          updateReviewStats();
          
          if (loadingEl) loadingEl.style.display = 'none';
          
          if (window.filteredReviews.length === 0) {
            if (emptyState) emptyState.style.display = 'block';
          } else {
            renderReviews();
          }
        } catch (error) {
          console.error('Error loading reviews:', error);
          if (loadingEl) loadingEl.style.display = 'none';
          if (emptyState) emptyState.style.display = 'block';
          showNotification('Failed to load reviews', 'error');
        }
      };
      
      // Apply filter logic
      window.applyReviewFilter = function(filter) {
        if (filter === 'all') {
          window.filteredReviews = [...window.allReviews];
        } else if (filter === 'verified') {
          window.filteredReviews = window.allReviews.filter(r => r.verified === true);
        } else if (filter === 'unverified') {
          window.filteredReviews = window.allReviews.filter(r => !r.verified);
        } else if (filter === 'with-image') {
          window.filteredReviews = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '');
        }
      };
      
      // Filter reviews function
      window.filterReviews = function(filter) {
        window.currentReviewFilter = filter;
        window.currentReviewPage = 1;
        
        // Update active tab
        document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
        const activeTab = document.getElementById(`filter-${filter}`);
        if (activeTab) activeTab.classList.add('active');
        
        applyReviewFilter(filter);
        renderReviews();
      };
      
      // Update statistics
      window.updateReviewStats = function() {
        const totalEl = document.getElementById('total-reviews');
        const verifiedEl = document.getElementById('verified-reviews');
        const imagesEl = document.getElementById('reviews-with-images');
        const productsEl = document.getElementById('reviewed-products');
        
        if (totalEl) totalEl.textContent = window.allReviews.length;
        if (verifiedEl) verifiedEl.textContent = window.allReviews.filter(r => r.verified).length;
        if (imagesEl) imagesEl.textContent = window.allReviews.filter(r => r.imageUrl && r.imageUrl.trim() !== '').length;
        if (productsEl) productsEl.textContent = new Set(window.allReviews.map(r => r.productId)).size;
      };
      
      // Render reviews
      window.renderReviews = function() {
        if (!window.filteredReviews) return;
        
        const start = (window.currentReviewPage - 1) * window.reviewItemsPerPage;
        const end = start + window.reviewItemsPerPage;
        const pageReviews = window.filteredReviews.slice(start, end);
        
        const tableWrapper = document.getElementById('reviews-table-wrapper');
        const mobileCards = document.getElementById('reviews-mobile-cards');
        const emptyState = document.getElementById('reviews-empty-state');
        const pagination = document.getElementById('reviews-pagination');
        
        if (pageReviews.length === 0) {
          if (emptyState) emptyState.style.display = 'block';
          if (pagination) pagination.style.display = 'none';
          return;
        }
        
        if (emptyState) emptyState.style.display = 'none';
        if (pagination) pagination.style.display = window.filteredReviews.length > window.reviewItemsPerPage ? 'flex' : 'none';
        
        // Render table rows (desktop view)
        const tableBody = document.getElementById('reviews-table-body');
        if (tableBody) {
          tableBody.innerHTML = pageReviews.map(review => {
            const product = window.reviewProducts[review.productId] || { 
              title: 'Unknown Product', 
              primaryImg: 'https://via.placeholder.com/80'
            };
            
            const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
            const date = review.timestamp ? review.timestamp.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
            
            return `
              <tr>
                <td>
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="product-thumb" style="background-image: url('${product.primaryImg}');"></div>
                    <span class="product-title">${product.title}</span>
                  </div>
                </td>
                <td>
                  <div style="font-weight: 700;">${review.reviewerName}</div>
                  <div style="font-size: 0.7rem; color: #666;">${review.city || ''}</div>
                </td>
                <td>
                  <span class="star-rating">${stars}</span> ${review.rating}
                </td>
                <td style="max-width: 250px;">
                  <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${review.comment}">
                    ${review.comment?.substring(0, 60)}${review.comment?.length > 60 ? '...' : ''}
                  </div>
                </td>
                <td>
                  ${review.imageUrl ? 
                    `<div class="review-thumb" style="background-image: url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}', '_blank')"></div>` : 
                    '<span style="color:#999;">—</span>'
                  }
                </td>
                <td>
                  ${review.verified ? 
                    '<span class="verified-badge"><i class="fa-solid fa-check"></i> Verified</span>' : 
                    '<span style="color:#999;">No</span>'
                  }
                </td>
                <td><span class="timestamp">${date}</span></td>
                <td>
                  <div class="action-btns">
                    <button class="action-btn" onclick="editReview('${review.id}')" title="Edit review">
                      <i class="fa-solid fa-edit"></i>
                    </button>
                    <button class="action-btn" onclick="deleteReview('${review.id}')" title="Delete review">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                    <button class="action-btn" onclick="viewReviewProduct('${review.productId}')" title="View product">
                      <i class="fa-solid fa-eye"></i>
                    </button>
                  </div>
                </td>
              </tr>
            `;
          }).join('');
        }
        
        // Render mobile cards
        const mobileCardsEl = document.getElementById('reviews-mobile-cards');
        if (mobileCardsEl) {
          mobileCardsEl.innerHTML = pageReviews.map(review => {
            const product = window.reviewProducts[review.productId] || { 
              title: 'Unknown Product', 
              primaryImg: 'https://via.placeholder.com/80'
            };
            
            const stars = '★'.repeat(Math.floor(review.rating)) + (review.rating % 1 >= 0.5 ? '½' : '');
            const date = review.timestamp ? review.timestamp.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
            
            return `
              <div class="notification-card">
                <div class="card-header">
                  <div class="card-thumb" style="background-image: url('${product.primaryImg}');"></div>
                  <div class="card-title">
                    <h4>${product.title}</h4>
                    <span class="product-id">${review.reviewerName}</span>
                  </div>
                </div>
                <div class="card-body">
                  <div class="card-row">
                    <i class="fa-solid fa-star"></i>
                    <span>${stars} (${review.rating})</span>
                  </div>
                  <div class="card-row">
                    <i class="fa-solid fa-city"></i>
                    <span>${review.city || 'Unknown'}</span>
                  </div>
                  <div class="card-row">
                    <i class="fa-solid fa-comment"></i>
                    <span>${review.comment?.substring(0, 50)}${review.comment?.length > 50 ? '...' : ''}</span>
                  </div>
                  ${review.imageUrl ? `
                    <div class="card-row">
                      <i class="fa-solid fa-image"></i>
                      <div class="review-thumb" style="background-image: url('${review.imageUrl}');" onclick="window.open('${review.imageUrl}', '_blank')"></div>
                    </div>
                  ` : ''}
                  <div class="card-row">
                    <i class="fa-regular fa-calendar"></i>
                    <span>${date}</span>
                  </div>
                  <div class="card-row">
                    <i class="fa-regular fa-circle-check"></i>
                    <span>Verified: ${review.verified ? '✓' : '✗'}</span>
                  </div>
                </div>
                <div class="card-footer">
                  <span>ID: ${review.id.substring(0, 8)}</span>
                  <div class="card-actions">
                    <button class="action-btn" onclick="editReview('${review.id}')" title="Edit">
                      <i class="fa-solid fa-edit"></i>
                    </button>
                    <button class="action-btn" onclick="deleteReview('${review.id}')" title="Delete">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                    <button class="action-btn" onclick="viewReviewProduct('${review.productId}')" title="View product">
                      <i class="fa-solid fa-eye"></i>
                    </button>
                  </div>
                </div>
              </div>
            `;
          }).join('');
        }
        
        updateReviewPagination();
      };
      
      // Pagination functions
      window.changeReviewPage = function(direction) {
        const totalPages = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
        
        if (direction === 'prev' && window.currentReviewPage > 1) {
          window.currentReviewPage--;
        } else if (direction === 'next' && window.currentReviewPage < totalPages) {
          window.currentReviewPage++;
        }
        
        renderReviews();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      window.goToReviewPage = function(page) {
        window.currentReviewPage = page;
        renderReviews();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      function updateReviewPagination() {
        const totalPages = Math.ceil(window.filteredReviews.length / window.reviewItemsPerPage);
        const pagination = document.getElementById('reviews-pagination');
        const prevBtn = document.getElementById('prev-review-page');
        const nextBtn = document.getElementById('next-review-page');
        const pageNumbers = document.getElementById('review-page-numbers');
        
        if (totalPages <= 1) {
          if (pagination) pagination.style.display = 'none';
          return;
        }
        
        if (pagination) pagination.style.display = 'flex';
        if (prevBtn) prevBtn.disabled = window.currentReviewPage === 1;
        if (nextBtn) nextBtn.disabled = window.currentReviewPage === totalPages;
        
        let pageNumbersHTML = '';
        const startPage = Math.max(1, window.currentReviewPage - 2);
        const endPage = Math.min(totalPages, window.currentReviewPage + 2);
        
        for (let i = startPage; i <= endPage; i++) {
          pageNumbersHTML += `
            <button class="page-btn ${i === window.currentReviewPage ? 'active' : ''}" onclick="goToReviewPage(${i})">
              ${i}
            </button>
          `;
        }
        
        if (pageNumbers) pageNumbers.innerHTML = pageNumbersHTML;
      }
      
      // Form functions
      window.toggleReviewPanel = function() {
        const panel = document.getElementById('reviewFormPanel');
        if (panel) {
          panel.classList.toggle('show');
          if (panel.classList.contains('show')) {
            resetReviewForm();
          }
        }
      };
      
      window.resetReviewForm = function() {
        document.getElementById('review-form').reset();
        document.getElementById('review-id').value = '';
        document.getElementById('review-form-title').innerHTML = 'Add New Review';
        document.getElementById('review-verified').checked = true;
        removeReviewImage();
        
        const panel = document.getElementById('reviewFormPanel');
        if (panel && !panel.classList.contains('show')) {
          panel.classList.add('show');
        }
      };
      
      window.addReviewImageFromUrl = function() {
        const url = document.getElementById('review-image-url').value.trim();
        if (!url) {
          showNotification('Please enter an image URL', 'error');
          return;
        }
        
        try {
          new URL(url);
        } catch {
          showNotification('Please enter a valid URL', 'error');
          return;
        }
        
        window.reviewImageUrl = url;
        const preview = document.getElementById('review-image-preview');
        const previewImg = document.getElementById('review-image-preview-img');
        if (previewImg) previewImg.src = url;
        if (preview) preview.style.display = 'block';
        document.getElementById('review-image-url').value = '';
      };
      
      window.handleReviewImageUpload = function(files) {
        if (!files || !files.length) return;
        
        const file = files[0];
        const url = URL.createObjectURL(file);
        window.reviewImageUrl = url;
        
        const preview = document.getElementById('review-image-preview');
        const previewImg = document.getElementById('review-image-preview-img');
        if (previewImg) previewImg.src = url;
        if (preview) preview.style.display = 'block';
      };
      
      window.removeReviewImage = function() {
        window.reviewImageUrl = '';
        const preview = document.getElementById('review-image-preview');
        if (preview) preview.style.display = 'none';
      };
      
      window.handleReviewSubmit = async function(e) {
        e.preventDefault();
        
        const productId = document.getElementById('review-product-id').value;
        const reviewerName = document.getElementById('reviewer-name').value;
        const reviewerCity = document.getElementById('reviewer-city').value;
        const rating = parseFloat(document.getElementById('review-rating').value);
        const comment = document.getElementById('review-comment').value;
        const verified = document.getElementById('review-verified').checked;
        const reviewId = document.getElementById('review-id').value;
        
        if (!productId) {
          showNotification('Please select a product', 'error');
          return false;
        }
        
        const reviewData = {
          productId: productId,
          reviewerName: reviewerName,
          city: reviewerCity,
          rating: rating,
          comment: comment,
          verified: verified,
          imageUrl: window.reviewImageUrl || '',
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        try {
          if (reviewId) {
            // Update existing review
            await db.collection('reviews').doc(reviewId).update(reviewData);
            showNotification('Review updated successfully!', 'success');
          } else {
            // Add new review
            await db.collection('reviews').add({
              ...reviewData,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showNotification('Review added successfully!', 'success');
          }
          
          // Reset form and close panel
          resetReviewForm();
          document.getElementById('reviewFormPanel').classList.remove('show');
          
          // Reload reviews
          await loadReviews();
        } catch (error) {
          console.error('Error saving review:', error);
          showNotification('Failed to save review', 'error');
        }
        
        return false;
      };
      
      window.editReview = function(id) {
        const review = window.allReviews.find(r => r.id === id);
        if (!review) return;
        
        // Fill form with review data
        document.getElementById('review-id').value = review.id;
        document.getElementById('review-product-id').value = review.productId;
        document.getElementById('reviewer-name').value = review.reviewerName;
        document.getElementById('reviewer-city').value = review.city || '';
        document.getElementById('review-rating').value = review.rating;
        document.getElementById('review-comment').value = review.comment;
        document.getElementById('review-verified').checked = review.verified === true;
        
        if (review.imageUrl) {
          window.reviewImageUrl = review.imageUrl;
          const preview = document.getElementById('review-image-preview');
          const previewImg = document.getElementById('review-image-preview-img');
          if (previewImg) previewImg.src = review.imageUrl;
          if (preview) preview.style.display = 'block';
        } else {
          removeReviewImage();
        }
        
        document.getElementById('review-form-title').innerHTML = 'Edit Review';
        
        // Show panel
        const panel = document.getElementById('reviewFormPanel');
        if (panel) {
          panel.classList.add('show');
          panel.scrollIntoView({ behavior: 'smooth' });
        }
      };
      
      window.deleteReview = async function(id) {
        if (!confirm('Are you sure you want to delete this review?')) return;
        
        try {
          await db.collection('reviews').doc(id).delete();
          showNotification('Review deleted successfully!', 'success');
          await loadReviews();
        } catch (error) {
          console.error('Error deleting review:', error);
          showNotification('Failed to delete review', 'error');
        }
      };
      
      window.viewReviewProduct = function(productId) {
        window.open(`product.html?id=${productId}`, '_blank');
      };
      
      // Export to CSV
      window.exportReviews = function() {
        const data = window.filteredReviews.map(review => {
          const product = window.reviewProducts[review.productId] || { title: 'Unknown Product' };
          const date = review.timestamp ? new Date(review.timestamp) : new Date();
          
          return {
            'Product': product.title,
            'Reviewer': review.reviewerName,
            'City': review.city || '',
            'Rating': review.rating,
            'Comment': review.comment,
            'Verified': review.verified ? 'Yes' : 'No',
            'Has Image': review.imageUrl ? 'Yes' : 'No',
            'Date': date.toLocaleDateString('en-IN'),
            'Review ID': review.id
          };
        });
        
        if (data.length === 0) {
          showNotification('No reviews to export', 'error');
          return;
        }
        
        // Convert to CSV
        const headers = Object.keys(data[0]);
        const csvRows = [];
        csvRows.push(headers.join(','));
        
        for (const row of data) {
          const values = headers.map(header => {
            const value = row[header]?.toString() || '';
            return `"${value.replace(/"/g, '""')}"`;
          });
          csvRows.push(values.join(','));
        }
        
        const csv = csvRows.join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `reviews_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        
        showNotification('Reviews exported successfully!', 'success');
      };
      
      // Search functionality
      const searchInput = document.getElementById('search-reviews');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          const searchTerm = e.target.value.toLowerCase();
          
          if (!searchTerm) {
            applyReviewFilter(window.currentReviewFilter);
          } else {
            window.filteredReviews = window.allReviews.filter(review => 
              review.reviewerName?.toLowerCase().includes(searchTerm) ||
              review.city?.toLowerCase().includes(searchTerm) ||
              review.comment?.toLowerCase().includes(searchTerm)
            );
          }
          
          window.currentReviewPage = 1;
          renderReviews();
        });
      }
      
      // Notification helper
      function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
          notification.remove();
        }, 3000);
      }
      
      // Initialize
      loadReviews();
    }
  }, 100);
})();
</script>
